<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Tools</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-wrapper">
    <div class="login-box">
      <h1>Tools</h1>
      <p>Sign in to access your tools.</p>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn" id="login-btn">Sign in</button>
      <p class="error-msg" id="error-msg"></p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // Replace these with your Firebase project values
    const firebaseConfig = {
      apiKey: "AIzaSyBuF2XsNTUVnaTDb4d6ECvh9p-uUFYvOn8",
      authDomain: "tools-site-e600e.firebaseapp.com",
      projectId: "tools-site-e600e",
      storageBucket: "tools-site-e600e.firebasestorage.app",
      messagingSenderId: "915811706580",
      appId: "1:915811706580:web:803e5753bab3abb6343d41",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // If already logged in, skip to dashboard
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = "dashboard.html";
    });

    document.getElementById("login-btn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errorEl = document.getElementById("error-msg");
      errorEl.style.display = "none";

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "dashboard.html";
      } catch (err) {
        errorEl.textContent = "Invalid email or password.";
        errorEl.style.display = "block";
      }
    });

    // Allow pressing Enter to submit
    document.getElementById("password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("login-btn").click();
    });
  </script>
</body>
</html>
