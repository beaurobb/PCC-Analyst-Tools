<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator — Tools</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <header class="site-header">
    <span class="logo"><a href="../dashboard.html" style="color:inherit;text-decoration:none;">← Tools</a></span>
    <button class="logout-btn" id="logout-btn">Sign out</button>
  </header>

  <main>
    <div class="tool-page">
      <h2>Calculator</h2>
      <div class="calc-display" id="display">0</div>
      <div class="calc-grid">
        <button class="calc-btn clear" onclick="clearAll()">AC</button>
        <button class="calc-btn op" onclick="toggleSign()">+/−</button>
        <button class="calc-btn op" onclick="percent()">%</button>
        <button class="calc-btn op" onclick="setOp('/')">÷</button>

        <button class="calc-btn" onclick="input('7')">7</button>
        <button class="calc-btn" onclick="input('8')">8</button>
        <button class="calc-btn" onclick="input('9')">9</button>
        <button class="calc-btn op" onclick="setOp('*')">×</button>

        <button class="calc-btn" onclick="input('4')">4</button>
        <button class="calc-btn" onclick="input('5')">5</button>
        <button class="calc-btn" onclick="input('6')">6</button>
        <button class="calc-btn op" onclick="setOp('-')">−</button>

        <button class="calc-btn" onclick="input('1')">1</button>
        <button class="calc-btn" onclick="input('2')">2</button>
        <button class="calc-btn" onclick="input('3')">3</button>
        <button class="calc-btn op" onclick="setOp('+')">+</button>

        <button class="calc-btn" onclick="input('0')" style="grid-column: span 2;">0</button>
        <button class="calc-btn" onclick="inputDot()">.</button>
        <button class="calc-btn equals" onclick="calculate()">=</button>
      </div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "REPLACE_WITH_YOUR_API_KEY",
      authDomain: "REPLACE_WITH_YOUR_AUTH_DOMAIN",
      projectId: "REPLACE_WITH_YOUR_PROJECT_ID",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (!user) window.location.href = "../index.html";
    });

    document.getElementById("logout-btn").addEventListener("click", () => {
      signOut(auth).then(() => { window.location.href = "../index.html"; });
    });
  </script>

  <script>
    let current = "0", prev = null, op = null, reset = false;

    const display = document.getElementById("display");
    const update = () => { display.textContent = current; };

    function input(d) {
      if (reset) { current = d; reset = false; }
      else current = current === "0" ? d : current + d;
      update();
    }

    function inputDot() {
      if (reset) { current = "0."; reset = false; update(); return; }
      if (!current.includes(".")) { current += "."; update(); }
    }

    function setOp(o) {
      if (op && !reset) calculate();
      prev = current; op = o; reset = true;
    }

    function calculate() {
      if (!op || prev === null) return;
      const a = parseFloat(prev), b = parseFloat(current);
      const results = { "+": a + b, "-": a - b, "*": a * b, "/": a / b };
      current = String(parseFloat(results[op].toFixed(10)));
      op = null; prev = null; reset = true;
      update();
    }

    function clearAll() { current = "0"; prev = null; op = null; reset = false; update(); }
    function toggleSign() { current = String(parseFloat(current) * -1); update(); }
    function percent() { current = String(parseFloat(current) / 100); update(); }
  </script>
</body>
</html>
